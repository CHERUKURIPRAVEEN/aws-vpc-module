name: Terraform Module Pipeline
run-name: CI/CD Pipeline for Terraform Module
permissions:
  contents: write

on:
  push:
    branches:
      - master
  
  # pull_request:
  #   branches:
  #     - master
  #   types:
  #     - opened
  #     - synchronize
  #     - reopened
    
env:
 TF_LOG: INFO
 AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
 AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
 TF_WORKING_DIR: .
 TF_VERSION: 1.12.2
 TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
 PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
 TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
 TF_LOCKS_TABLE: ${{ secrets.TF_LOCKS_TABLE }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: aws cli setup
        uses: ./.github/actions/aws_cli

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Install Terraform
        uses: ./.github/actions/terraform

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      
      - name: Terraform backend init
        run: |
          terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=modules/vpc/mod_vpc.tfstate" \
          -backend-config="region=us-east-1" \
          -backend-config="dynamodb_table=${{ secrets.TF_LOCKS_TABLE }}"

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: ./.github/actions/tflint
        
      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Install Checkov Dependencies
        uses: ./.github/actions/checkov

      - name: Checkov Scan
        run: |
          $HOME/.checkov-env/bin/checkov \
            -d . \
            --download-external-modules true \
            --skip-check CKV_GHA_7,CKV_TF_1 \
            --soft-fail

  plan:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/terraform

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -var-file=variables/dev_ci.tfvars -out=tfplan
      
      - name: Show Terraform Plan
        run: terraform show -no-color tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/terraform
      
      - name: Terraform Initialize
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
  
  release:
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Release
        id: version
        run: |
          chmod +x scripts/tag_increment.sh
          ./scripts/tag_increment.sh

  cleanup:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/terraform
      
      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file=variables/dev_ci.tfvars \
            -auto-approve
